<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" type="image/x-icon" href="assets/img/pokeball.png">
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/assets.css">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/variables.css">
</head>

<body onload="init()">
    <header>
        <nav>
            <img src="assets/img/pokeball.png" alt="Pokeball">
            <h1>Pokedex</h1>
        </nav>
    </header>
    <main>
        <section>
            Search Section
        </section>
        <section>
            <div class="dialog_wrapper">
                <div id="standard_card">

                </div>
                <div class="card_extra_info">
                    <button>about</button>
                    <button>stats</button>
                </div>
                <div class="about_section">
                    <div id="about_key_section">
                        <p class="about_key">weight</p>
                        <p class="about_key">height</p>
                        <p class="about_key">abilities</p>
                    </div>
                    <div id="about_value_section">
                        <p class="about_value">30</p>
                        <p class="about_value">30</p>
                        <p class="about_value">30</p>
                    </div>
                </div>
                <div class="stats_section">
                    <div id="stats_key_section">
                        <p class="stat_key">hp</p>
                        <p class="stat_key">attack</p>
                        <p class="stat_key">defense</p>
                    </div>
                    <div id="stats_value_section">
                        <p class="stat_value">30</p>
                        <p class="stat_value">30</p>
                        <p class="stat_value">30</p>
                    </div>
                </div>
            </div>
        </section>
        <section id="pokedex_content" class="pokedex_content">
            <div class="pkm_content_card">
                <p class="pkm_name">Pokemon Name</p>
                <p class="pkm_number">Nummer</p>
                <img class="pkm_img" id="poke_img" src="assets/img/ditto.png">
                <div class="pkm_type">
                    <div>
                        Typ 1
                    </div>
                    <div>
                        Typ 2
                    </div>
                </div>
            </div>
        </section>

    </main>
    <footer>
        <a href="">Link zur PokeApi</a>
    </footer>

</body>

</html>
