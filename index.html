<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="icon" type="image/x-icon" href="assets/img/pokeball.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/assets.css">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/colors.css">
</head>

<body onload="init()">
    <header>
        <nav>
            <a href="index.html"><img src="assets/img/pokeball.png" alt="Pokeball"></a>
            <h1>Pokédex</h1>
        </nav>
    </header>
    <main>
        <section class="search_section">
            <div class="search_section_wrapper">
                <label for="pokemon_search"></label>
                <input id="pokemon_search" class="pokemon_search" type="text" minlength="3"
                    placeholder="find your pokemon">
                <button onclick="searchForPokemon()" id="search_button" class="search_button">Search</button>
            </div>
            <p id="search_error" class="d_none">Insert at least 3 characters</p>
        </section>
        <dialog onclick="closeDialog()" id="dialog_popup">
            <div onclick="event.stopPropagation()" class="dialog_wrapper">
                <button onclick="closeDialog()" class="close_button"><img src="assets/img/close_x.png"
                        alt="Schließen Button"></button>
                <div id="standard_card"></div>
                <div id="dialog_info_button"></div>
                <div id="info_section"></div>
                <div id="dialog_arrows"></div>
            </div>
        </dialog>
        <section id="pokedex_content" class="pokedex_content"></section>
        <section id="loading_screen" class="loading_screen d_none">
            <img class="loading_spinner" src="assets/img/loading_spinner.png" alt="Ladebildschirm Pokeball">
            <p>Pokédex is loading...</p>
        </section>
        <button onclick="fetchMorePokemon()" id="show_more_button">Load more pokemon</button>

    </main>
    <footer>
        <a href="">Link zur PokeApi</a>
    </footer>
    <script src="script.js"></script>

</body>

</html>
