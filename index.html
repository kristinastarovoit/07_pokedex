<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" type="image/x-icon" href="assets/img/pokeball.png">
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/assets.css">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/variables.css">
</head>

<body onload="init()">
    <header>
        <nav>
            <img src="assets/img/pokeball.png" alt="Pokeball">
            <h1>Pokedex</h1>
        </nav>
    </header>
    <main>
        <section>
            Search Section
        </section>
        <dialog onclick="closeDialog()" id="dialog_popup">
            <div onclick="event.stopPropagation()" class="dialog_wrapper">
                <button onclick="closeDialog()">close</button>
                <div id="standard_card"></div>
                <div id="dialog_info_button"></div>
                <div id="info_section"></div>
                <div id="dialog_arrows">
                    <!-- <button class="dialog_arrow"><img class="dialog_arrow_left" src="assets/img/arrow.svg" alt="Pfeil links"></button>
                    <button class="dialog_arrow"><img class="dialog_arrow_right" src="assets/img/arrow.svg" alt="Pfeil rechts"></button> -->
                </div>
            </div>
        </dialog>
        <section id="pokedex_content" class="pokedex_content"></section>
        <button onclick="fetchMorePokemon()" id="show_more_button">Load more pokemon</button>

    </main>
    <footer>
        <a href="">Link zur PokeApi</a>
    </footer>

</body>

</html>
